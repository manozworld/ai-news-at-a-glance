name: Fetch AI news

on:
  schedule:
    # Daily at 06:00 UTC. Adjust to taste; cron is UTC.
    - cron: "0 6 * * *"
  workflow_dispatch:  # lets you trigger manually from the Actions tab

# Allow the workflow to commit the updated news.json back to the repo
permissions:
  contents: write

concurrency:
  group: fetch-news
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch and summarize
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/run.py

      - name: Commit updates if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/news.json
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "chore: update news data ($(date -u +%Y-%m-%d))"
            git push
          fi
